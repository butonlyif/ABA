services:
  web:
    build:
      context: ..
      dockerfile: apps/mobile-web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      ABA_ENVIRONMENT: production
      ABA_DATABASE_URL: postgresql+psycopg://aba:${POSTGRES_PASSWORD}@postgres:5432/aba
      ABA_JWT_SECRET: ${ABA_JWT_SECRET}
      ABA_CORS_ORIGINS: ${ABA_CORS_ORIGINS:-http://localhost:8080}
      ABA_FLASHCARD_ASSET_ROOT: /app/assets
      ABA_UPLOAD_PATH: /app/uploads
      ABA_REDIS_URL: redis://redis:6379/0
      ABA_STORAGE_BACKEND: s3
      ABA_S3_ENDPOINT_URL: http://minio:9000
      ABA_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      ABA_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ABA_S3_BUCKET: aba-reports
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - ../src/aba:/app/assets:ro
      - uploads_data:/app/uploads

  worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: python -m app.worker
    environment:
      ABA_ENVIRONMENT: production
      ABA_DATABASE_URL: postgresql+psycopg://aba:${POSTGRES_PASSWORD}@postgres:5432/aba
      ABA_JWT_SECRET: ${ABA_JWT_SECRET}
      ABA_REDIS_URL: redis://redis:6379/0
      ABA_STORAGE_BACKEND: s3
      ABA_S3_ENDPOINT_URL: http://minio:9000
      ABA_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      ABA_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ABA_S3_BUCKET: aba-reports
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  migrate:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: alembic upgrade head
    environment:
      ABA_ENVIRONMENT: production
      ABA_DATABASE_URL: postgresql+psycopg://aba:${POSTGRES_PASSWORD}@postgres:5432/aba
      ABA_JWT_SECRET: ${ABA_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aba
      POSTGRES_USER: aba
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aba"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - object_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/aba-reports;
      "
    depends_on:
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  object_data:
