limit_req_zone $binary_remote_addr zone=login_limit:10m rate=2r/m;
limit_req_zone $binary_remote_addr zone=public_ai_limit:10m rate=20r/m;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /api/v1/auth/login {
    limit_req zone=login_limit burst=10 nodelay;
    limit_req_status 429;
    proxy_pass http://api:8000/api/v1/auth/login;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/v1/chat/public {
    limit_req zone=public_ai_limit burst=20 nodelay;
    limit_req_status 429;
    proxy_pass http://api:8000/api/v1/chat/public;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://api:8000/api/;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /admin {
    return 301 /admin/;
  }

  location /admin/ {
    try_files $uri $uri/ /admin/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
